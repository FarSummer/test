<!DOCTYPE html>
<html lang="en">

<style>
    #image{
        position: relative;
        text-align: center;
    }

    #button{
        position: relative;
        text-align:center;
    }

    .button{
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 10px;
        padding-bottom: 10px;
        color:aliceblue;
        background: transparent;
        border: none;
        cursor: pointer;
        font-family: "LXGWWenKai";
        font-size: 20px;
        text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);

        transition: background 0.4s ease, 
                transform 0.3s ease, 
                box-shadow 0.4s ease,
                color 0.3s ease;
    }

    .button:hover{
        color:black;
        background-color: aliceblue;
        font-family: "LXGWWenKai";
        font-size: 20px;
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.8);
        text-shadow:none
    }

    .default{
        color:aliceblue;
        text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
        font-family: "LXGWWenKai";
        font-size: 20px;
        text-align:center;
    }


</style>
